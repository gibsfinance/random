<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gibs Games — provably fair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400..900,0..100,0..1&family=Schibsted+Grotesk:wght@400;500;700&family=Spline+Sans+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --felt-900: #07150d;
        --felt-800: #0b2014;
        --felt-700: #11301d;
        --felt-600: #1a4029;
        --line: #235636;
        --cream: #f3ead7;
        --cream-dim: #d8cdb4;
        --ink: #1d1a12;
        --brass: #c9a227;
        --brass-soft: #8a7634;
        --heads: #58c08a;
        --tails: #e26d5a;
        --bad: #ff6b5e;
        --ok: #6fdca6;
        --serif: 'Fraunces', Georgia, serif;
        --sans: 'Schibsted Grotesk', system-ui, sans-serif;
        --mono: 'Spline Sans Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html { color-scheme: dark; }
      body {
        margin: 0;
        color: var(--cream);
        font: 15px/1.55 var(--sans);
        background:
          radial-gradient(1200px 600px at 50% -10%, rgba(201, 162, 39, 0.07), transparent 60%),
          radial-gradient(900px 500px at 85% 110%, rgba(88, 192, 138, 0.05), transparent 55%),
          repeating-linear-gradient(0deg, transparent 0 2px, rgba(0, 0, 0, 0.12) 2px 4px),
          var(--felt-800);
        min-height: 100vh;
      }
      #root { max-width: 920px; margin: 0 auto; padding: 1.25rem 1.25rem 4rem; }

      /* ---------- type ---------- */
      h1 {
        font-family: var(--serif);
        font-weight: 800;
        font-variation-settings: 'SOFT' 60, 'WONK' 1;
        font-size: 2.1rem;
        letter-spacing: 0.01em;
        margin: 0;
        color: var(--cream);
      }
      h1 .gold { color: var(--brass); }
      h2 {
        font-family: var(--serif);
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--brass);
        margin: 2.2rem 0 0.6rem;
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }
      h2::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--brass-soft), transparent); }
      h3 { font-family: var(--serif); font-weight: 700; font-size: 1.02rem; margin: 0 0 0.6rem; color: var(--cream); }

      /* ---------- controls ---------- */
      button {
        font: 600 0.92rem var(--sans);
        color: var(--ink);
        background: linear-gradient(180deg, #dcc26a, var(--brass));
        border: 1px solid #9a7d1f;
        border-radius: 4px;
        padding: 0.5rem 1.05rem;
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 244, 200, 0.5) inset, 0 2px 6px rgba(0, 0, 0, 0.35);
        transition: transform 0.06s ease, filter 0.15s ease;
      }
      button:hover:not(:disabled) { filter: brightness(1.07); }
      button:active:not(:disabled) { transform: translateY(1px); }
      button:disabled { background: var(--felt-600); color: #6f8b78; border-color: var(--line); box-shadow: none; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--cream);
        border: 1px solid var(--line);
        box-shadow: none;
      }
      button.secondary:hover:not(:disabled) { border-color: var(--brass-soft); color: var(--brass); filter: none; }
      button.danger { background: linear-gradient(180deg, #e98577, #c14b3b); border-color: #8e3527; color: #fff; }
      input, select {
        background: var(--felt-900);
        color: var(--cream);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0.48rem 0.65rem;
        font: 500 0.92rem var(--sans);
      }
      input:focus, select:focus { outline: 1px solid var(--brass-soft); }

      /* ---------- surfaces ---------- */
      .card {
        position: relative;
        background: linear-gradient(180deg, var(--felt-700), var(--felt-800));
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 1.05rem 1.15rem;
        margin: 0.7rem 0;
        animation: rise 0.45s ease both;
      }
      .card::before {
        content: '';
        position: absolute;
        inset: 4px;
        border: 1px solid rgba(201, 162, 39, 0.16);
        border-radius: 3px;
        pointer-events: none;
      }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .card:nth-of-type(2) { animation-delay: 0.05s; }
      .card:nth-of-type(3) { animation-delay: 0.1s; }
      .card:nth-of-type(4) { animation-delay: 0.15s; }

      .banner { border-left: 3px solid var(--brass); background: var(--felt-700); border-radius: 4px; padding: 0.8rem 1rem; margin: 0.7rem 0; }
      .banner.bad { border-left-color: var(--bad); color: #ffb9b1; }

      .row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
      .mono { font-family: var(--mono); font-size: 0.82em; word-break: break-all; }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .muted { color: #8aa492; }
      .tag {
        display: inline-block;
        font: 600 0.74rem var(--sans);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: var(--felt-900);
        border: 1px solid var(--line);
        color: var(--cream-dim);
        border-radius: 999px;
        padding: 0.14rem 0.62rem;
        margin-right: 0.4rem;
      }
      .tag.ok { color: var(--ok); border-color: rgba(111, 220, 166, 0.4); }
      .tag.gold { color: var(--brass); border-color: var(--brass-soft); }

      table { border-collapse: collapse; width: 100%; }
      td, th { text-align: left; padding: 0.34rem 0.6rem; border-bottom: 1px solid rgba(35, 86, 54, 0.55); }

      /* ---------- header marquee ---------- */
      .marquee {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.9rem 0 1rem;
        border-bottom: 3px double var(--brass-soft);
        margin-bottom: 1rem;
      }
      .strapline { font: 500 0.8rem var(--sans); letter-spacing: 0.22em; text-transform: uppercase; color: var(--brass); margin-top: 0.15rem; }

      /* ---------- ticket tabs ---------- */
      .tabs { display: flex; gap: 0.6rem; align-items: center; margin: 0.9rem 0 0.4rem; }
      .tab {
        font: 700 0.95rem var(--serif);
        color: var(--cream-dim);
        background: var(--felt-700);
        border: 1px solid var(--line);
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        padding: 0.5rem 1.2rem 0.55rem;
        box-shadow: none;
      }
      .tab.active {
        color: var(--ink);
        background: linear-gradient(180deg, var(--cream), #e4d8bd);
        border-color: #b3a275;
      }
      .blockline { margin-left: auto; font: 600 0.78rem var(--mono); color: #79927f; }

      /* ---------- coin side picker ---------- */
      .side-picker { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
      .side-picker button {
        border: none; border-radius: 0; box-shadow: none; background: var(--felt-900); color: var(--cream-dim);
        padding: 0.45rem 1.1rem; font-weight: 700;
      }
      .side-picker button.sel-heads { background: var(--heads); color: var(--ink); }
      .side-picker button.sel-tails { background: var(--tails); color: var(--ink); }

      .coin {
        display: inline-block; width: 1.05em; height: 1.05em; vertical-align: -0.18em; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #f0d97c, var(--brass) 60%, #8a6f15);
        border: 1px solid #8a6f15; margin-right: 0.45em;
      }
      .flipping .coin { animation: spin 1.1s linear infinite; }
      @keyframes spin { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }

      /* ---------- the receipt (verify panel) ---------- */
      .receipt {
        position: relative;
        margin-top: 0.9rem;
        background:
          repeating-linear-gradient(0deg, transparent 0 3px, rgba(0, 0, 0, 0.025) 3px 6px),
          var(--cream);
        color: var(--ink);
        border-radius: 2px;
        padding: 0.9rem 1.05rem 1rem;
        font-family: var(--mono);
        font-size: 0.82rem;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        --notch: radial-gradient(circle, transparent 0 4px, var(--cream) 4.5px);
      }
      .receipt::before, .receipt::after {
        content: '';
        position: absolute; left: 0; right: 0; height: 7px;
        background-image: radial-gradient(circle at 6px 0px, transparent 0 4px, var(--cream) 4.5px);
        background-size: 14px 7px;
      }
      .receipt::before { top: -6px; transform: rotate(180deg); }
      .receipt::after { bottom: -6px; }
      .receipt h3 { font-family: var(--mono); font-weight: 600; font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: #6b6049; margin-bottom: 0.55rem; }
      .receipt table td { border-bottom: 1px dashed #c9bda0; padding: 0.3rem 0.4rem; vertical-align: top; }
      .receipt .muted { color: #857a60; }
      .receipt .mono { color: #3c372a; }
      .stamp {
        display: inline-block;
        margin-top: 0.7rem;
        font: 700 0.9rem var(--sans);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.3rem 0.8rem;
        border: 2.5px solid currentColor;
        border-radius: 4px;
        transform: rotate(-2.5deg);
        animation: stamp 0.3s cubic-bezier(0.2, 1.6, 0.4, 1) both;
      }
      @keyframes stamp { from { opacity: 0; transform: rotate(-2.5deg) scale(1.6); } to { opacity: 1; transform: rotate(-2.5deg) scale(1); } }
      .stamp.ok { color: #1d7a4c; }
      .stamp.bad { color: #b3261e; }

      /* ---------- house rules (trust) ---------- */
      .house-rules { border: 1px solid var(--brass-soft); border-radius: 6px; background: var(--felt-700); margin: 0.7rem 0; overflow: hidden; }
      .house-rules > summary {
        list-style: none; cursor: pointer; user-select: none;
        display: flex; align-items: center; gap: 0.6rem;
        padding: 0.65rem 1rem;
        font: 700 0.95rem var(--serif);
        color: var(--brass);
      }
      .house-rules > summary::-webkit-details-marker { display: none; }
      .house-rules > summary::after { content: '▾'; margin-left: auto; transition: transform 0.2s; color: var(--brass-soft); }
      .house-rules[open] > summary::after { transform: rotate(180deg); }
      .house-rules .body { padding: 0 1rem 1rem; border-top: 1px solid var(--line); }
      .house-rules ul { margin: 0.6rem 0; padding-left: 1.1rem; }
      .house-rules a { color: var(--brass); }
      .rules-ack { font: 600 0.78rem var(--sans); letter-spacing: 0.05em; color: var(--ok); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
